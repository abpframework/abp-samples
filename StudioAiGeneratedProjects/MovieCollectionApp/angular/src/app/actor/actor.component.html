<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col col-md-6">
        <h5 class="card-title">
          {{ '::Menu:Actors' | abpLocalization }}
        </h5>
      </div>
      <div class="text-end col col-md-6">
        <div class="text-lg-end pt-2">
          <button
            *abpPermission="'MovieCollectionApp.Actors.Create'"
            id="create"
            class="btn btn-primary"
            type="button"
            (click)="createActor()"
          >
            <i class="fa fa-plus me-1"></i>
            <span>{{ '::NewActor' | abpLocalization }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="card-body">
    <ngx-datatable [rows]="actor.items" [count]="actor.totalCount" [list]="list" default>
      <ngx-datatable-column
        [name]="'::Actions' | abpLocalization"
        [maxWidth]="150"
        [sortable]="false"
      >
        <ng-template let-row="row" ngx-datatable-cell-template>
          <div ngbDropdown container="body" class="d-inline-block">
            <button
              class="btn btn-primary btn-sm dropdown-toggle"
              data-toggle="dropdown"
              aria-haspopup="true"
              ngbDropdownToggle
            >
              <i class="fa fa-cog me-1"></i>{{ '::Actions' | abpLocalization }}
            </button>
            <div ngbDropdownMenu>
              <button
                *abpPermission="'MovieCollectionApp.Actors.Edit'"
                ngbDropdownItem
                (click)="editActor(row.id)"
              >
                {{ '::Edit' | abpLocalization }}
              </button>
              <button
                *abpPermission="'MovieCollectionApp.Actors.Delete'"
                ngbDropdownItem
                (click)="delete(row.id)"
              >
                {{ '::Delete' | abpLocalization }}
              </button>
            </div>
          </div>
        </ng-template>
      </ngx-datatable-column>
      <ngx-datatable-column [name]="'::Name' | abpLocalization" prop="name"></ngx-datatable-column>
      <ngx-datatable-column [name]="'::BirthDate' | abpLocalization" prop="birthDate">
        <ng-template let-row="row" ngx-datatable-cell-template>
          {{ row.birthDate | date }}
        </ng-template>
      </ngx-datatable-column>
      <ngx-datatable-column [name]="'::Biography' | abpLocalization" prop="biography">
        <ng-template let-row="row" ngx-datatable-cell-template>
          {{ row.biography?.length > 50 ? row.biography.substring(0, 50) + '...' : row.biography }}
        </ng-template>
      </ngx-datatable-column>
    </ngx-datatable>
  </div>
</div>

<abp-modal [(visible)]="isModalOpen">
  <ng-template #abpHeader>
    <h3>{{ (selectedActor.id ? '::Edit' : '::NewActor') | abpLocalization }}</h3>
  </ng-template>

  <ng-template #abpBody>
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="mt-2">
        <label for="actor-name">{{ '::Name' | abpLocalization }}</label><span> * </span>
        <input type="text" id="actor-name" class="form-control" formControlName="name" autofocus />
      </div>

      <div class="mt-2">
        <label>{{ '::BirthDate' | abpLocalization }}</label><span> * </span>
        <div class="input-group">
          <input
            class="form-control"
            name="datepicker"
            formControlName="birthDate"
            ngbDatepicker
            #d="ngbDatepicker"
          />
          <button class="btn btn-outline-secondary" type="button" (click)="d.toggle()">
            <i class="fa fa-calendar"></i>
          </button>
        </div>
      </div>

      <div class="mt-2">
        <label for="actor-biography">{{ '::Biography' | abpLocalization }}</label>
        <textarea id="actor-biography" class="form-control" formControlName="biography" rows="4"></textarea>
      </div>
    </form>
  </ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" abpClose>
      {{ '::Close' | abpLocalization }}
    </button>

    <button class="btn btn-primary" (click)="save()" [disabled]="form.invalid">
      <i class="fa fa-check mr-1"></i>
      {{ '::Save' | abpLocalization }}
    </button>
  </ng-template>
</abp-modal>
