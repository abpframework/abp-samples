<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col col-md-6">
        <h5 class="card-title">
          {{ '::Menu:Exercises' | abpLocalization }}
        </h5>
      </div>
      <div class="text-end col col-md-6">
        <div class="text-lg-end pt-2">
          <button
            *abpPermission="'GymWorkoutPlanner.Exercises.Create'"
            id="create"
            class="btn btn-primary"
            type="button"
            (click)="createExercise()"
          >
            <i class="fa fa-plus me-1"></i>
            <span>{{ '::NewExercise' | abpLocalization }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="card-body">
    <ngx-datatable [rows]="exercises.items" [count]="exercises.totalCount" [list]="list" default>
      <ngx-datatable-column [name]="'::Actions' | abpLocalization" [maxWidth]="150" [sortable]="false">
        <ng-template let-row="row" ngx-datatable-cell-template>
          <div ngbDropdown container="body" class="d-inline-block">
            <button class="btn btn-primary btn-sm dropdown-toggle" ngbDropdownToggle>
              <i class="fa fa-cog me-1"></i>{{ '::Actions' | abpLocalization }}
            </button>
            <div ngbDropdownMenu>
              <button *abpPermission="'GymWorkoutPlanner.Exercises.Edit'" ngbDropdownItem (click)="editExercise(row.id)">
                {{ '::Edit' | abpLocalization }}
              </button>
              <button *abpPermission="'GymWorkoutPlanner.Exercises.Delete'" ngbDropdownItem (click)="delete(row.id)">
                {{ '::Delete' | abpLocalization }}
              </button>
            </div>
          </div>
        </ng-template>
      </ngx-datatable-column>

      <ngx-datatable-column [name]="'::Name' | abpLocalization" prop="name"></ngx-datatable-column>
      <ngx-datatable-column [name]="'::TargetMuscleGroup' | abpLocalization" prop="targetMuscleGroup"></ngx-datatable-column>
      <ngx-datatable-column [name]="'::Description' | abpLocalization" prop="description"></ngx-datatable-column>
    </ngx-datatable>
  </div>
</div>

<abp-modal [(visible)]="isModalOpen">
  <ng-template #abpHeader>
    <h3>{{ (selectedExercise.id ? '::Edit' : '::NewExercise') | abpLocalization }}</h3>
  </ng-template>

  <ng-template #abpBody>
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="mt-2">
        <label for="exercise-name">{{ '::Name' | abpLocalization }}</label><span> * </span>
        <input type="text" id="exercise-name" class="form-control" formControlName="name" autofocus />
      </div>

      <div class="mt-2">
        <label for="exercise-target">{{ '::TargetMuscleGroup' | abpLocalization }}</label><span> * </span>
        <input type="text" id="exercise-target" class="form-control" formControlName="targetMuscleGroup" />
      </div>

      <div class="mt-2">
        <label for="exercise-description">{{ '::Description' | abpLocalization }}</label>
        <textarea id="exercise-description" class="form-control" rows="3" formControlName="description"></textarea>
      </div>
    </form>
  </ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" abpClose>
      {{ '::Close' | abpLocalization }}
    </button>

    <button class="btn btn-primary" (click)="save()" [disabled]="form.invalid">
      <i class="fa fa-check mr-1"></i>
      {{ '::Save' | abpLocalization }}
    </button>
  </ng-template>
</abp-modal>
